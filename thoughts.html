  <body data-style-mode="minimal" data-demo-features="off">
    <header class="site-header">
        <a class="brand" href="./index.html">Charlie Thompson</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="./thoughts.html" aria-current="page">Thoughts</a>

        <details class="nav-dropdown">

    <main>
      <h1>Thoughts</h1>

      <div class="mode-checkpoint" role="tablist" aria-label="Choose a thoughts page">
        <button
          class="mode-checkpoint-button"
          id="tweets-tab"
          type="button"
          role="tab"
          aria-controls="tweets-panel"
          aria-selected="false"
          data-thought-mode="tweets"
        >
          Tweets
        </button>
        <button
          class="mode-checkpoint-button"
          id="posts-tab"
          type="button"
          role="tab"
          aria-controls="posts-panel"
          aria-selected="false"
          data-thought-mode="posts"
        >
          Posts
        </button>
      </div>

      <section
        class="thought-collection"
        id="tweets-panel"
        role="tabpanel"
        aria-labelledby="tweets-tab"
        data-thought-panel="tweets"
        hidden
      >
        <details class="tweet-filter-disclosure">
          <summary>Filter</summary>
          <form class="tweet-filter" data-tweet-filter>
            <label>
              Search
              <input type="search" autocomplete="off" placeholder="Search tweets" data-tweet-search>
            </label>
            <label>
              Year
              <select data-tweet-year>
                <option value="">All years</option>
              </select>
            </label>
            <button type="button" data-tweet-clear>Clear</button>
            <output aria-live="polite" data-tweet-filter-count></output>
          </form>
        </details>

        <ul class="tweet-list" data-tweet-list data-src="./data/tweets/public-posts.json?v=tweet-pages-1">
          <li>Loading tweets...</li>
        </ul>
      </section>

      <section
        class="thought-collection"
        id="posts-panel"
        role="tabpanel"
        aria-labelledby="posts-tab"
        data-thought-panel="posts"
        hidden
      >
        <ul>
          <li>
            <a href="https://contextengine.xyz/posts/agent-village-wrapped-2026">
              Agent Village Wrapped 2026
            </a>
          </li>
        </ul>
      </section>
    </main>

    <script src="./thoughts.js?v=tweet-pages-1"></script>
    <script src="./site-settings.js?v=launch-themes-4"></script>
